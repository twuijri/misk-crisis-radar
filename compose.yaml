services:
  crisis-radar:
    # Image is built automatically by GitHub Actions and pushed to GHCR.
    # For a local build instead, comment this out and use:  build: .
    image: ghcr.io/twuijri/misk-crisis-radar:latest
    container_name: misk-crisis-radar
    restart: unless-stopped
    pull_policy: always
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - ACCESS_CODE=${ACCESS_CODE:-}
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.misk.rule=Host(`misk.i3u.us`)"
      - "traefik.http.routers.misk.entrypoints=web"
      - "traefik.http.services.misk.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"

networks:
  # Must match the external network your Traefik container is on.
  proxy:
    external: true
