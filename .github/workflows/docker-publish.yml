name: Build and publish images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            context: .
          - name: api
            context: ./api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build version
        id: ver
        run: echo "value=$(date -u +%Y.%m.%d-%H%M)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.value }}
          tags: ghcr.io/${{ github.repository_owner }}/misk-crisis-radar-${{ matrix.name }}:latest
